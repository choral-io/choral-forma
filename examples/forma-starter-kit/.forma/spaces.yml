schemaVersion: 1

spaces:
  notes:
    title: Notes
    display:
      order: 10
    description: Guides, feature demos, and starter knowledge documents.
    include: notes/**/*.md
    template: .forma/templates/note.md
    create:
      directory: notes
      filename: "{{ input.slug }}.md"
      inputs:
        title:
          field: title
          required: true
        summary:
          field: summary
          default: ""
        slug:
          label: Slug
          type: string
          default: "{{ input.title }}"
          transform: slugify
        createdAt:
          field: createdAt
          default: "{{ runtime.values.currentDateTime }}"
    conventions:
      titleField: title
      summaryField: summary
      createdAtField: createdAt
    schema:
      type: object
      fields:
        kind:
          type: const
          value: note
          required: true
        title:
          type: string
          label: Title
          required: true
        summary:
          type: string
          label: Summary
        createdAt:
          type: datetime
          label: Created At
          required: true
        updatedAt:
          type: datetime
          label: Updated At

  todos:
    title: Todos
    display:
      order: 20
    description: Example onboarding and workspace setup tasks.
    include: todos/**/*.md
    template: .forma/templates/todo.md
    create:
      directory: todos
      filename: "{{ input.slug }}.md"
      inputs:
        title:
          field: title
          required: true
        summary:
          field: summary
          default: ""
        slug:
          label: Slug
          type: string
          default: "{{ input.title }}"
          transform: slugify
        status:
          field: status
          default: todo
        createdAt:
          field: createdAt
          default: "{{ runtime.values.currentDateTime }}"
    conventions:
      titleField: title
      summaryField: summary
      createdAtField: createdAt
    schema:
      type: object
      fields:
        kind:
          type: const
          value: todo
          required: true
        title:
          type: string
          label: Title
          required: true
        summary:
          type: string
          label: Summary
        status:
          type: enum
          enum: todoStatus
          label: Status
          required: true
        assignees:
          type: list
          label: Assignees
          items:
            type: ref
            target: user
        dueDate:
          type: date
          label: Due Date
        createdAt:
          type: datetime
          label: Created At
          required: true

  users:
    title: Users
    display:
      order: 30
    description: Example people referenced by tasks and documents.
    include: users/**/*.md
    template: .forma/templates/user.md
    create:
      directory: users
      filename: "{{ input.slug }}.md"
      inputs:
        name:
          field: name
          required: true
        description:
          field: description
          default: ""
        responsibilities:
          field: responsibilities
          default: ""
        slug:
          label: Slug
          type: string
          default: "{{ input.name }}"
          transform: slugify
        createdAt:
          field: createdAt
          default: "{{ runtime.values.currentDateTime }}"
    conventions:
      titleField: name
      summaryField: description
      createdAtField: createdAt
    schema:
      type: object
      fields:
        kind:
          type: const
          value: user
          required: true
        name:
          type: string
          label: Name
          required: true
        description:
          type: string
          label: Description
        responsibilities:
          type: string
          label: Responsibilities
        createdAt:
          type: datetime
          label: Created At
          required: true
