schemaVersion: 1

workspace:
  name: "Choral Forma Example"
  root: "."
  canonicalLanguage: "en"
  supportedLanguages:
    - "en"
    - "zh-Hans"
  timezone: "UTC"
  logo:
    path: "assets/logo.svg"
    alt: "Choral Forma Example"

include:
  - ".forma/dashboard.md"
  - ".forma/spaces/*.md"
  - ".forma/views/*.md"
  - ".forma/local/*.yml"
  - ".forma/local/*.md"

runtime:
  values:
    currentDateTime:
      kind: currentDateTime
    workspaceRoot:
      kind: workspaceRoot
    currentUserId:
      kind: gitConfig
      key: user.name
      transform: slugify
      required: true
