[settings]
idiomatic_version_file_enable_tools = ["node", "pnpm", "rust"]

[tasks."check:knowledge"]
description = "Check knowledge Markdown files with Prettier"
run = "pnpm check:knowledge"

[tasks."format:knowledge"]
description = "Format knowledge Markdown files with Prettier"
run = "pnpm format:knowledge"

[tasks."check:rust"]
description = "Check Rust workspace"
depends = ["build:web"]
run = "cargo fmt --all -- --check && cargo check --workspace"

[tasks."format:rust"]
description = "Format Rust workspace"
run = "cargo fmt --all"

[tasks."test:rust"]
description = "Test Rust workspace"
depends = ["build:web"]
run = "cargo test --workspace"

[tasks."check:web"]
description = "Typecheck web workspace"
run = "pnpm check"

[tasks."build:web"]
description = "Build web workspace"
run = "pnpm build"

[tasks.check]
description = "Run all project checks"
depends = ["check:knowledge", "check:rust", "test:rust", "check:web", "build:web"]
