[settings]
idiomatic_version_file_enable_tools = ["node", "pnpm", "rust"]

[tasks."check:pnpm"]
description = "Check non-Rust files with pnpm-managed tools"
run = "pnpm check && pnpm lint"

[tasks."format:pnpm"]
description = "Format non-Rust files with pnpm-managed tools"
run = "pnpm format"

[tasks."test:pnpm"]
description = "Test pnpm workspace"
run = "pnpm test"

[tasks."check:rust"]
description = "Check Rust workspace"
depends = ["build:pnpm"]
run = "cargo fmt --all -- --check && cargo check --workspace"

[tasks."format:rust"]
description = "Format Rust workspace"
run = "cargo fmt --all"

[tasks."test:rust"]
description = "Test Rust workspace"
depends = ["build:pnpm"]
run = "cargo test --workspace"

[tasks."build:pnpm"]
description = "Build pnpm workspace"
run = "pnpm build"

[tasks.check]
description = "Run all project checks"
depends = ["check:pnpm", "test:pnpm", "check:rust", "test:rust"]
